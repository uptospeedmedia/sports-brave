name: Deploy to IPFS and Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to IPFS via Pinata
        uses: ipshipyard/ipfs-deploy-action@v1
        with:
          path: dist
          pinata-jwt: ${{ secrets.PINATA_JWT }}